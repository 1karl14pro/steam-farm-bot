version: '3.8'

services:
  # База данных с автоматическими бэкапами
  database:
    image: alpine:latest
    container_name: steam-farm-db
    restart: unless-stopped
    volumes:
      - db-data:/data
      - db-backups:/backups
    command: >
      sh -c "
      while true; do
        if [ -f /data/database.db ]; then
          cp /data/database.db /backups/database-$(date +%Y%m%d-%H%M%S).db
          find /backups -name 'database-*.db' -mtime +7 -delete
        fi
        sleep 3600
      done
      "
    healthcheck:
      test: ["CMD", "test", "-f", "/data/database.db"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Telegram Bot Service
  bot:
    build:
      context: .
      dockerfile: Dockerfile.bot
    container_name: steam-farm-bot
    restart: unless-stopped
    mem_limit: 256m
    mem_reservation: 128m
    cpus: 0.5
    env_file:
      - .env
    environment:
      - SERVICE_TYPE=bot
      - DB_PATH=/data/database.db
    volumes:
      - db-data:/data
      - ./logs:/app/logs
    depends_on:
      - database
    healthcheck:
      test: ["CMD", "node", "-e", "process.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Farm Service (Steam Sessions)
  farm:
    build:
      context: .
      dockerfile: Dockerfile.farm
    container_name: steam-farm-service
    restart: unless-stopped
    mem_limit: 384m
    mem_reservation: 256m
    cpus: 1.0
    env_file:
      - .env
    environment:
      - SERVICE_TYPE=farm
      - DB_PATH=/data/database.db
    volumes:
      - db-data:/data
      - ./logs:/app/logs
    depends_on:
      - database
    healthcheck:
      test: ["CMD", "node", "-e", "process.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  db-data:
    driver: local
  db-backups:
    driver: local
